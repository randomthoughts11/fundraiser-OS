name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx prisma validate

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run test

      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fundraiser
          AUTH_BYPASS_DEV: "true"
          SKIP_ENV_VALIDATION: "true"
